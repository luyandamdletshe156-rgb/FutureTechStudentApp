name: Build and deploy ASP app to Azure Web App - futuretechacademy2

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read # This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      # 1. Setup modern .NET 8 instead of old MSBuild/NuGet
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # 2. Restore dependencies using dotnet
      - name: Restore dependencies
        run: dotnet restore

      # 3. Build and Publish the main web app to a specific folder
      # Specifying the project path ensures it doesn't try to publish your .Tests project
      - name: Build and Publish
        run: dotnet publish FutureTechStudentApp/FutureTechStudentApp.csproj -c Release -o ${{ github.workspace }}/published

      # 4. Upload the published files as an artifact
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: ASP-app
          path: ${{ github.workspace }}/published

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write # This is required for requesting the JWT
      contents: read  # This is required for actions/checkout

    steps:
      # 5. Download the artifact to a specific folder
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: ASP-app
          path: ./published-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_9B739223D82A43A890BBB801B4E157A9 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_4C5AF57A37834A0694115077BF1C0F02 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_707EBAD00CCB473C8436F2E09913129A }}

      # 6. Deploy the downloaded folder to Azure
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'futuretechacademy2'
          slot-name: 'Production'
          package: ./published-app
